services:
  # 1. The Controller: Your FastAPI Application
  runint-benchmarks-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: runint_api
    ports:
      - "8001:8000"
    volumes:
      - .:/app                 # Hot-reloading: changes in code reflect immediately
      - ./results:/app/results # Persist CSVs to host machine
      - ./data:/app/data       # Allow access to local datasets
    environment:
      #- DB_URL=postgresql://user:password@db:5432/runint_benchmarks
      - OLLAMA_URL=http://ollama:11434
      - VLLM_URL=http://vllm:8000
    depends_on:
      #- runint-db
      - ollama
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # 2. The Storage: PostgreSQL with JSONB support
  # db:
  #   image: postgres:15-alpine
  #   container_name: runint_db
  #   ports:
  #     - "5432:5432"  # Exposed to host for easy inspection (DBeaver, TablePlus)
  #   environment:
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #     POSTGRES_DB: runint_benchmarks
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # 3. The Engine: Ollama (CPU/GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: runint_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama  # Persist downloaded models
    # If you have an NVIDIA GPU, uncomment the section below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # 4. The Heavy Engine: vLLM (Optional/Advanced)
  # Uncomment this when you are ready for production-grade serving
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: runint_vllm
  #   runtime: nvidia
  #   environment:
  #     - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
  #   ports:
  #     - "8001:8000"
  #   command: --model mistralai/Mistral-7B-v0.1 --dtype auto --api-key runint-key

volumes:
  postgres_data:
  ollama_models:

networks:
  runint-network:
    external: true
